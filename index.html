<!-- index.html -->
<!DOCTYPE html>
<html lang="en">
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Luviko</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <div id="sidebar-left">
      <div class="squad-header">
        <div class="squad-title" contenteditable="true" id="squad-name" spellcheck="false">Squad Name</div>
        <div class="hint">✏️ Click to edit name & players</div>
      </div>
      <div id="subs">
        <div class="sub add-btn" onclick="openModal('add')">+ Add Player</div>
      </div>
    </div>
    
    <div id="pitch"></div>
    
    <div id="panel">
      <div id="player-details">
        <div class="empty-state">
          <div class="hint-large">Select a player</div>
          <div class="hint-small">Click two to swap positions</div>
        </div>
      </div>
      
      <div id="swap-section" class="hidden">
        <div class="swap-preview">
          <div id="swap-p1"></div>
          <span class="swap-arrow">⇄</span>
          <div id="swap-p2"></div>
        </div>
        <button class="btn-swap" onclick="executeSwap()">Confirm Swap</button>
        <button class="btn-cancel" onclick="clearSelection()">Cancel</button>
      </div>
      
      <div class="formations">
        <h4>Formation</h4>
        <div class="formation-grid" id="formation-list"></div>
      </div>
    </div>
  </div>
  
  <!-- Modal -->
  <div id="modal" class="modal hidden">
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="modal-title">Add Player</h3>
        <button class="modal-close" onclick="closeModal()">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>Player Name</label>
          <input type="text" id="input-name" placeholder="e.g. Lionel Messi" autocomplete="off">
        </div>
        <div class="form-group">
          <label>Position</label>
          <select id="input-role">
            <option value="GK">GK - Goalkeeper</option>
            <option value="CB">CB - Center Back</option>
            <option value="LB">LB - Left Back</option>
            <option value="RB">RB - Right Back</option>
            <option value="LWB">LWB - Left Wing Back</option>
            <option value="RWB">RWB - Right Wing Back</option>
            <option value="CDM">DM - Defensive Mid</option>
            <option value="CM">CM - Central Mid</option>
            <option value="CAM">CAM - Attacking Mid</option>
            <option value="LM">LM - Left Mid</option>
            <option value="RM">RM - Right Mid</option>
            <option value="LW">LW - Left Winger</option>
            <option value="RW">RW - Right Winger</option>
            <option value="ST">ST - Striker</option>
            <option value="CF">CF - Center Forward</option>
          </select>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-secondary" onclick="closeModal()">Cancel</button>
        <button class="btn-primary" onclick="savePlayer()">Save</button>
      </div>
    </div>
  </div>
  
  <script src="app.js"></script>
</body>
</html>
